gateway:
  request_timeout: 600
  idle_timeout_seconds: 600
  session_directory: sessions
  max_recent_messages: 20
  api_key: null # Set to require "Authorization: Bearer <key>".
  # This configured model makes route decisions for requests using model: auto.
  classifier_model: classifier
  classifier_timeout: 10

models:
  classifier:
    endpoint: "http://127.0.0.1:8003/v1"
    timeout: 30
    health_path: "/models"
    start_command: >-
      llama-server
      -m "D:\AI\Models\Your-Small-Instruct-Model.gguf"
      --host 127.0.0.1
      --port 8003
      -c 2048
      -ngl 99

  chat:
    endpoint: "http://localhost:8001/v1"
    timeout: 600
    health_path: "/models"
    # Replace the executable and .gguf path with your installed locations.
    # start_command: >-
    #   llama-server
    #   -m "D:\\AI\\Models\\Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf"
    #   --host 127.0.0.1
    #   --port 8001
    #   -c 8192
    #   -ngl 99
  coder:
    endpoint: "http://localhost:8002/v1"
    timeout: 600
    health_path: "/models"
    # start_command: >-
    #   llama-server
    #   -m "D:\\AI\\Models\\Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf"
    #   --host 127.0.0.1
    #   --port 8002
    #   -c 16384
    #   -ngl 99

routes:
  coding:
    model: coder
    keywords: ["code", "program", "bug", "python", "javascript", "typescript", "docker", "git", "api"]
  chat:
    model: chat
    keywords: []

tools:
  enabled: false
  allowed_git_commands: ["status", "diff", "log", "branch"]
  allowed_docker_commands: ["ps", "images"]
