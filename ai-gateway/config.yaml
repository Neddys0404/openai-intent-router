gateway:
  request_timeout: 600
  idle_timeout_seconds: 600
  session_directory: sessions
  max_recent_messages: 20
  # Required for network hosting. Set this environment variable before launching:
  # export AI_GATEWAY_API_KEY="replace-with-a-long-random-secret"
  api_key_env: AI_GATEWAY_API_KEY
  require_api_key: true
  # This configured model makes route decisions for requests using model: auto.
  classifier_model: classifier
  classifier_timeout: 20

models:
  classifier:
    endpoint: "http://127.0.0.1:9000/v1"
    timeout: 30
    startup_timeout: 120
    # Keep this small CPU classifier warm so auto-routing does not evict the answer model.
    persistent: true
    health_path: "/models"
    start_command: >-
      ~/llama.cpp/build/bin/llama-server
      -m "/mnt/storage120/models/router/qwen2.5-3b-instruct-q4_k_m.gguf"
      --host 127.0.0.1
      --port 9000
      -c 2048
      -ngl 0

  chat:
    endpoint: "http://localhost:8001/v1"
    timeout: 600
    health_path: "/models"
    start_command: >-
      ~/llama.cpp/build/bin/llama-server
      -m "/mnt/storage120/models/gemma-4-26B_q4_0-it.gguf"
      --mmproj "/mnt/storage120/models/mmproj/gemma-4-26B-it-mmproj.gguf"
      --host 127.0.0.1
      --port 8001
      -c 16384
      --temp 0.6
      --top-p 0.95
      --top-k 20
      --repeat-penalty 1.05
      --batch-size 2048
      --ubatch-size 512
      --cache-type-k q8_0
      --cache-type-v q8_0

  coder:
    endpoint: "http://localhost:8002/v1"
    timeout: 600
    health_path: "/models"
    start_command: >-
      ~/llama.cpp/build/bin/llama-server
      -m "/mnt/storage120/models/qwen3.5-4B-super-coder/qwen3.5-4B-super-coder.Q4_0.gguf"
      --mmproj "/mnt/storage120/models/qwen3.5-4B-super-coder/qwen3.5-4B-super-coder.BF16-mmproj.gguf"
      --host 127.0.0.1
      --port 8002
      -c 32768
      --temp 0.1
      --top-p 0.9
      --top-k 20
      --repeat-penalty 1.1
      --batch-size 2048
      --ubatch-size 512
      --cache-type-k q8_0
      --cache-type-v q8_0

routes:
  coding:
    model: coder
    keywords: ["code", "program", "bug", "python", "javascript", "typescript", "docker", "git", "api", "cpp", "c++", "cmake", "esp-idf", "esp32", "bash", "shell", "systemd"]
  chat:
    model: chat
    keywords: []

# OpenAI-compatible POST /v1/images/generations.  This runs sd-cli directly
# (without a shell or tmux), logs each job under output_directory/logs, and
# serializes access with the managed GPU models.
image_generation:
  enabled: true
  # Advertised through /v1/models for clients such as Odysseus. This ID is for
  # the Images API only; do not select it for chat completions.
  model: qwen-image-2512
  # Compatibility ID for clients that only auto-detect OpenAI image-model names.
  aliases: ["gpt-image-1"]
  sd_cli: "/home/ned/stable-diffusion.cpp/build/bin/sd-cli"
  diffusion_model: "/mnt/storage120/models/qwen-image-2512/qwen-image-2512-Q4_K_M.gguf"
  vae: "/mnt/storage120/models/qwen-image-2512/vae/qwen_image_vae.safetensors"
  llm: "/mnt/storage120/models/qwen-image-2512/vl/Qwen2.5-VL-7B-Instruct-UD-Q4_K_XL.gguf"
  output_directory: "/home/ned/QwenGen"
  # The Qwen Image stack needs about 19 GB VRAM and will not fit on the 4 GB
  # GTX 1650 Ti. This CPU profile avoids CUDA allocations; expect it to be
  # substantially slower. Set cpu_only: false and tune the offload options if
  # you later move image generation to a GPU with enough VRAM.
  cpu_only: true
  offload_to_cpu: true
  clip_on_cpu: true
  vae_on_cpu: true
  # threads: 8  # Optional: cap CPU threads; omitted uses all physical cores.
  timeout_seconds: 900
  max_prompt_characters: 8000
  allowed_sizes: ["1024x1024"]
  cfg_scale: 2.5
  sampling_method: euler
  steps: 40
  flow_shift: 3

tools:
  enabled: false
  allowed_git_commands: ["status", "diff", "log", "branch"]
  allowed_docker_commands: ["ps", "images"]
