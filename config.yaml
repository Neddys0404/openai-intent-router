# AI Gateway Configuration

# Model Registry: Maps capability/route names to endpoints
models:
  chat:
    endpoint: "http://localhost:8001"
    timeout: 600
  coder:
    endpoint: "http://localhost:8002"
    timeout: 600
  vision:
    endpoint: "http://localhost:8003"
    timeout: 600

# Default model to use if no classification occurs or when explicit mode is off
default_model: "chat"

# Routes: Maps intent/capability to a specific model
routes:
  coding:
    model: "coder"
  chat:
    model: "chat"
  research:
    workflow:
      - "searxng"
      - "chat"
  vision:
    model: "vision"

# Gateway Settings
gateway:
  debug: true
  log_level: "INFO"
  idle_timeout_minutes: 10
